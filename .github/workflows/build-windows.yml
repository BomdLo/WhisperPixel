name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "steg_gui.py"
      - "steg_secure.py"
      - "requirements.txt"
      - ".github/workflows/build-windows.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow pyinstaller

      - name: Build EXE (one-folder GUI)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name StegSecureWin steg_gui.py

      - name: Package output
        shell: pwsh
        run: |
          Compress-Archive -Path dist/StegSecureWin/* -DestinationPath dist/StegSecureWin.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StegSecureWin
          path: dist/StegSecureWin.zip
